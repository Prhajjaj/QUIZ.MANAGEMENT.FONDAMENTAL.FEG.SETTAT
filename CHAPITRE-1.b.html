<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Management - Prof. HAJJAJ</title>
    <style>
        :root { 
            --purp: #6c5ce7; 
            --bg: #f0f3f7; 
            --white: #ffffff; 
            --text: #2d3436; 
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .course-header { text-align: center; margin-bottom: 50px; }
        .course-header h2 { color: var(--purp); margin: 0; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px; 
            width: 100%;
            max-width: 1400px; 
        }

        @media (max-width: 1150px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 750px) { .cards-grid { grid-template-columns: 1fr; } }

        .scene { 
            height: 400px; /* Encore un peu plus haut pour le texte détaillé */
            perspective: 1200px; 
            cursor: pointer;
        }
        
        .card-inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
        }
        
        .scene.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 25px; 
            padding: 30px; 
            box-sizing: border-box; 
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.15); 
            text-align: center;
        }
        
        .card-front { 
            background: var(--white); 
            border: 4px solid var(--purp); 
            color: var(--text); 
        }
        
        .card-back { 
            background: var(--purp); 
            color: white; 
            transform: rotateY(180deg); 
        }

        .emoji { font-size: 60px; margin-bottom: 15px; }
        h3 { font-size: 22px; margin: 0; line-height: 1.4; font-weight: 700; }
        
        /* Style spécifique pour le texte de réponse plus long */
        .answer-text { 
            font-size: 16px; 
            line-height: 1.5; 
            text-align: left; 
            width: 100%;
        }

        .instruction { 
            font-size: 12px; 
            color: var(--purp); 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-top: 20px; 
            letter-spacing: 1px;
        }
        .card-back .instruction { color: rgba(255,255,255,0.8); }

        .footer-prof { margin-top: 60px; font-size: 18px; font-weight: bold; color: var(--purp); }
    </style>
</head>
<body>
<div style="margin-bottom: 20px;">
    <a href="INDEX.HTML" style="
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        background-color: #6a1b9a; 
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.9em;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    ">
        <span style="margin-right: 8px;">🏠</span> Retour à la liste des Quiz
    </a>
</div>
<div class="course-header">
    <h2>Management Fondamental S2</h2>
</div>

<div class="cards-grid" id="grid-container"></div>

<div class="footer-prof">Professeur HAJJAJ</div>

<script>
    const db = [
        { 
            q: "Qu'est-ce que l'entreprise selon l'approche traditionnelle ?", 
            e: "🏗️", 
            a: "<strong>1. Unité de production :</strong> Elle crée des biens ou services en transformant des inputs en outputs (ex: Farine+Four+Boulanger → Pain).<br><br><strong>2. Unité de distribution de richesse :</strong> Elle rémunère les agents ayant participé à la production (salaires, impôts, intérêts, dividendes...)." 
        },
        { q: "Quelles sont les quatre dimensions de l'entreprise ?", e: "📋", a: "1. Combinaison de moyens<br>2. Unité de production<br>3. Unité économique (profit)<br>4. Entité autonome." },
        { q: "Donnez des exemples d'inputs (intrants) pour un boulanger.", e: "🍞", a: "Matières premières, machines, four, et le travail du boulanger." },
        { q: "À qui l'entreprise distribue-t-elle des richesses sous forme de 'dividendes' ?", e: "💰", a: "Aux actionnaires qui ont apporté le capital." },
        { q: "Quels sont les agents économiques rémunérés par l'entreprise ?", e: "👥", a: "Salariés (salaires), État (impôts/cotisations), Banques (intérêts), Fournisseurs (prix), Actionnaires (dividendes)." },
        { q: "Quelles sont les trois types de combinaisons de moyens dans une entreprise ?", e: "🤝", a: "1. Moyens **Humains** <br>2. Moyens **Matériels** <br>3. Moyens **Financiers**." }
    ];

    const container = document.getElementById('grid-container');

    db.forEach((item) => {
        container.innerHTML += `
            <div class="scene" onclick="this.classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="emoji">${item.e}</div>
                        <h3>${item.q}</h3>
                        <div class="instruction">Voir la définition corrigée</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="emoji">💡</div>
                        <div class="answer-text">${item.a}</div>
                        <div class="instruction">Retourner</div>
                    </div>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
