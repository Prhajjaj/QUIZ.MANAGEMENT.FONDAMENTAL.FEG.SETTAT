<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dimension Économique - Pr. Mouna HAJJAJ</title>
    <style>
        :root { 
            --purp-dark: #4a148c; 
            --purp-med: #7b1fa2;
            --purp-light: #f3e5f5; 
            --white: #ffffff;
            --success: #2e7d32;
            --error: #c62828;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .header { background: var(--purp-dark); color: white; width: 100%; max-width: 750px; padding: 25px; border-radius: 15px 15px 0 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }

        .quiz-container { background: var(--white); width: 100%; max-width: 750px; padding: 30px; border-radius: 0 0 15px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        .question-box { margin-bottom: 30px; display: none; animation: fadeIn 0.5s; }
        .question-text { font-size: 18px; font-weight: bold; color: var(--purp-dark); margin-bottom: 20px; line-height: 1.5; }

        .btn-group { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 15px; border: 2px solid var(--purp-med); background: white; color: var(--purp-med); border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: var(--purp-light); }
        
        .btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .btn.wrong { background: var(--error); color: white; border-color: var(--error); }

        .explanation { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e3f2fd; border-left: 5px solid #2196f3; font-size: 14px; display: none; line-height: 1.6; }

        #next-btn { width: 100%; margin-top: 20px; padding: 15px; background: var(--purp-dark); color: white; border: none; border-radius: 10px; cursor: pointer; display: none; font-weight: bold; }
        
        .progress { font-size: 12px; color: #777; margin-bottom: 10px; text-align: right; }
        .footer { margin-top: 30px; text-align: right; width: 100%; max-width: 750px; font-weight: bold; color: var(--purp-dark); border-top: 1px solid var(--purp-light); padding-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div style="margin-bottom: 20px;">
    <a href="INDEX.HTML" style="
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        background-color: #6a1b9a; /* Violet identique à votre index */
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.9em;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    ">
        <span style="margin-right: 8px;">🏠</span> Retour à la liste des Quiz
    </a>
</div>
    <div class="header">
        <h1>Analyse Macro-Économique</h1>
           </div>

    <div class="quiz-container">
        <div class="progress" id="progress-text">Question 1 / 4</div>
        
        <div id="q-container">
            </div>

        <div class="explanation" id="explanation-box"></div>
        <button id="next-btn" onclick="nextQuestion()">Passer à la question suivante ➔</button>
    </div>

    <div class="footer">Pr. Mouna HAJJAJ - Management S2</div>

    <script>
        const quizData = [
            {
                q: "L'inflation est un facteur du micro-environnement car elle modifie le prix de vente des produits de l'entreprise.",
                ans: false,
                exp: "<strong>Faux.</strong> L'inflation est une variable monétaire globale qui touche toute l'économie. C'est donc un facteur du <strong>Macro-environnement</strong> (le 'E' de PESTEL)."
            },
            {
                q: "La hausse du Produit Intérieur Brut (PIB) est généralement un indicateur de croissance opportun pour l'entreprise.",
                ans: true,
                exp: "<strong>Vrai.</strong> Une hausse du PIB signifie une création de richesse nationale, ce qui favorise souvent la consommation et l'investissement."
            },
            {
                q: "Le taux de chômage n'impacte que l'aspect social et n'a aucune influence sur la stratégie économique d'une firme.",
                ans: false,
                exp: "<strong>Faux.</strong> Le chômage réduit le pouvoir d'achat global (demande) et influence la disponibilité de la main-d'œuvre (offre). C'est une variable économique clé."
            },
            {
                q: "La politique budgétaire de l'État (impôts, aides publiques) est une composante du macro-environnement.",
                ans: true,
                exp: "<strong>Vrai.</strong> Les décisions de l'État s'imposent à toutes les entreprises de manière globale, ce qui relève de l'analyse Macro."
            }
        ];

        let currentIdx = 0;

        function showQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const container = document.getElementById('q-container');
            container.innerHTML = `
                <div class="question-box" style="display:block;">
                    <div class="question-text">${data.q}</div>
                    <div class="btn-group">
                        <button class="btn" onclick="check(true, this)">VRAI</button>
                        <button class="btn" onclick="check(false, this)">FAUX</button>
                    </div>
                </div>
            `;
        }

        function check(userAns, btn) {
            const data = quizData[currentIdx];
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(b => b.disabled = true);

            if (userAns === data.ans) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                // Montrer le bon bouton
                buttons.forEach(b => {
                    if ((b.innerText === "VRAI" && data.ans) || (b.innerText === "FAUX" && !data.ans)) {
                        b.classList.add('correct');
                    }
                });
            }

            const expBox = document.getElementById('explanation-box');
            expBox.innerHTML = data.exp;
            expBox.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                showQuestion();
            } else {
                document.querySelector('.quiz-container').innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <h2 style="color:var(--purp-dark);">Quiz Terminé !</h2>
                        <p>Vous avez complété l'analyse de la dimension économique.</p>
                        <button class="btn" onclick="location.reload()" style="max-width:200px; margin-top:20px;">Recommencer</button>
                    </div>
                `;
            }
        }

        showQuestion();
    </script>
</body>
</html>
